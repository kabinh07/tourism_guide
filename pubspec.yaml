environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.1.0
  lucide_icons_flutter: ^3.1.13
  flutter_svg: ^2.2.4
  flutter_riverpod: ^2.5.1
